name: Build AppFlowy Web Docker Image
run-name: >-
  Build AppFlowy Web appflowy/appflowy_web:${{ github.event_name == 'workflow_dispatch' && format('{0}{1}', github.event.inputs.tag_name, github.event.inputs.test == 'true' && '_test' || '') || github.ref_name }} ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.tag_latest == 'true' && github.event.inputs.test != 'true') || github.event_name == 'push') && 'appflowy/appflowy_web:latest' || '' }}

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the Docker image (e.g., v1.2.3 or 1.2.3)'
        required: true
        type: string
      appflowy_web_branch:
        description: 'Branch to build from AppFlowy-Web repo'
        required: false
        default: 'main'
        type: string
      build_arm64:
        description: 'Also build ARM64 images (AMD64 always built)'
        type: boolean
        required: false
        default: true
      tag_latest:
        description: 'Also tag and publish as latest'
        type: boolean
        required: false
        default: true
      test:
        description: 'If true, append _test to tag and skip latest tag'
        type: boolean
        required: false
        default: false

env:
  LATEST_TAG: latest

jobs:
  appflowy_web_image:
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job: ${{ fromJson((github.event_name == 'workflow_dispatch' && github.event.inputs.build_arm64 == 'true' && '[{"os":"ubuntu-22.04","platform":"linux/amd64","arch":"amd64"},{"os":"ubuntu-22.04-arm","platform":"linux/arm64","arch":"arm64v8"}]') || (github.event_name == 'push' && '[{"os":"ubuntu-22.04","platform":"linux/amd64","arch":"amd64"},{"os":"ubuntu-22.04-arm","platform":"linux/arm64","arch":"arm64v8"}]') || '[{"os":"ubuntu-22.04","platform":"linux/amd64","arch":"amd64"}]') }}
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/appflowy_web

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.appflowy_web_branch || github.ref }}
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Get git tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            T="${{ github.event.inputs.tag_name }}"
            if [ "${{ github.event.inputs.test }}" == "true" ]; then
              T="${T}_test"
            fi
          else
            # Extract tag from ref (e.g., refs/tags/v1.2.3 -> v1.2.3)
            T="${GITHUB_REF#refs/tags/}"
          fi
          echo "GIT_TAG=$T" >> $GITHUB_ENV
          echo "Tag: $T"

      - name: Print Docker image tag
        run: |
          SHOULD_TAG_LATEST="${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.tag_latest == 'true' && github.event.inputs.test != 'true') || github.event_name == 'push') && 'true' || 'false' }}"
          IMAGE_TAG="${IMAGE_NAME}:${GIT_TAG}-${{ matrix.job.arch }}"

          echo "Docker image tag: ${IMAGE_TAG}"
          {
            echo "### Docker image tag"
            echo ""
            echo "- Image: \`${IMAGE_TAG}\`"
            echo "- Platform: \`${{ matrix.job.platform }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$SHOULD_TAG_LATEST" == "true" ]]; then
            LATEST_IMAGE_TAG="${IMAGE_NAME}:${LATEST_TAG}-${{ matrix.job.arch }}"
            echo "Latest Docker image tag: ${LATEST_IMAGE_TAG}"
            echo "- Latest image: \`${LATEST_IMAGE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: registry.hub.docker.com/${{ env.IMAGE_NAME }}

      - name: Build and push to appflowy_web
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.job.platform }}
          file: ./docker/Dockerfile.ssr
          push: true
          cache-from: type=gha,scope=appflowy_web-${{ matrix.job.arch }}
          cache-to: type=gha,mode=max,scope=appflowy_web-${{ matrix.job.arch }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.GIT_TAG }}-${{ matrix.job.arch }}
            ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.tag_latest == 'true' && github.event.inputs.test != 'true') || github.event_name == 'push') && format('{0}:{1}-{2}', env.IMAGE_NAME, env.LATEST_TAG, matrix.job.arch) || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          build-args: |
            VERSION=${{ env.GIT_TAG }}

      - name: Logout from Docker Hub
        if: always()
        run: docker logout

  appflowy_web_manifest:
    runs-on: ubuntu-22.04
    needs: [appflowy_web_image]
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/appflowy_web
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Get git tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            T="${{ github.event.inputs.tag_name }}"
            if [ "${{ github.event.inputs.test }}" == "true" ]; then
              T="${T}_test"
            fi
          else
            # Extract tag from ref (e.g., refs/tags/v1.2.3 -> v1.2.3)
            T="${GITHUB_REF#refs/tags/}"
          fi
          echo "GIT_TAG=$T" >> $GITHUB_ENV
          echo "Tag: $T"

      - name: Print final Docker image names
        run: |
          SHOULD_TAG_LATEST="${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.tag_latest == 'true' && github.event.inputs.test != 'true') || github.event_name == 'push') && 'true' || 'false' }}"
          SHOULD_BUILD_ARM64="${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.build_arm64 == 'true') || github.event_name == 'push') && 'true' || 'false' }}"
          VERSION_IMAGE="${IMAGE_NAME}:${GIT_TAG}"

          echo "Final Docker image: ${VERSION_IMAGE}"
          {
            echo "### Final Docker image names"
            echo ""
            echo "- \`${VERSION_IMAGE}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$SHOULD_TAG_LATEST" == "true" ]]; then
            LATEST_IMAGE="${IMAGE_NAME}:${LATEST_TAG}"
            echo "Final Docker image: ${LATEST_IMAGE}"
            echo "- \`${LATEST_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo ""
            echo "### Source architecture tags"
            echo ""
            echo "- \`${IMAGE_NAME}:${GIT_TAG}-amd64\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$SHOULD_BUILD_ARM64" == "true" ]]; then
            echo "- \`${IMAGE_NAME}:${GIT_TAG}-arm64v8\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create and push manifest for appflowy_web:version
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          inputs: ${{ env.IMAGE_NAME }}:${{ env.GIT_TAG }}
          images: ${{ env.IMAGE_NAME }}:${{ env.GIT_TAG }}-amd64${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.build_arm64 == 'true') || github.event_name == 'push') && format(',{0}:{1}-arm64v8', env.IMAGE_NAME, env.GIT_TAG) || '' }}
          push: true

      - name: Create and push manifest for appflowy_web:latest
        if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.tag_latest == 'true' && github.event.inputs.test != 'true') || (github.event_name == 'push') }}
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          inputs: ${{ env.IMAGE_NAME }}:${{ env.LATEST_TAG }}
          images: ${{ env.IMAGE_NAME }}:${{ env.LATEST_TAG }}-amd64${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.build_arm64 == 'true') || github.event_name == 'push') && format(',{0}:{1}-arm64v8', env.IMAGE_NAME, env.LATEST_TAG) || '' }}
          push: true

      - name: Logout from Docker Hub
        if: always()
        run: docker logout
